<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netflix</title>
    <style>
        :root { --n-red: #E50914; --n-black: #000000; --n-gray: #121212; --n-white: #FFFFFF; }
        body { background-color: var(--n-black); color: var(--n-white); font-family: 'Helvetica Neue', Arial; margin: 0; padding: 0; user-select: none; }
        
        /* Login */
        #login-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .profile-box { display: flex; gap: 30px; margin-top: 30px; }
        .profile { text-align: center; cursor: pointer; }
        .profile img { width: 100px; height: 100px; border-radius: 4px; border: 2px solid transparent; }
        .profile:active img { border-color: white; transform: scale(0.9); }

        /* UI General */
        header { padding: 15px 4%; display: flex; justify-content: space-between; align-items: center; background: #000; }
        .user-info { font-size: 0.8rem; text-align: right; }
        .user-info span { color: var(--n-red); font-weight: bold; display: block; }

        .container { padding: 0 4%; }
        .view { display: none; }
        .active { display: block; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .card { border-radius: 4px; overflow: hidden; position: relative; border: 1px solid #222; }
        .card img { width: 100%; height: auto; display: block; }

        /* Lista Episodios */
        .ep-row { padding: 15px 0; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .winner-tag { font-size: 0.7rem; color: #aaa; margin-top: 4px; font-style: italic; }
        .winner-tag b { color: var(--n-red); }

        /* Control de Puntos */
        .points-area { margin-top: 40px; text-align: center; }
        .target-name { font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 20px; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 30px; }
        .btn-p { background: #333; color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 1.8rem; }
        .score-big { font-size: 4rem; font-weight: bold; min-width: 80px; }

        .btn-finish { background: var(--n-red); color: white; border: none; padding: 15px; width: 100%; font-weight: bold; margin-top: 40px; border-radius: 4px; }
        .locked-card { background: #111; padding: 20px; border-radius: 10px; border: 1px dashed #333; }
    </style>
</head>
<body>

<div id="login" class="view active">
    <div id="login-screen">
        <h1>¿Quién está viendo?</h1>
        <div class="profile-box">
            <div class="profile" onclick="login('franco')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="F">
                <p>Franco</p>
            </div>
            <div class="profile" onclick="login('jess')">
                <img src="https://prodigits.co.uk/thumbs/wallpapers/p2/movies/31/76d1810b12631524.jpg" alt="J">
                <p>Jess</p>
            </div>
        </div>
    </div>
</div>

<header id="main-header" style="display:none">
    <div style="color:var(--n-red); font-weight:bold; font-size:1.4rem">NETFLIX</div>
    <div class="user-info">
        Perfil: <span id="current-user-name"></span>
        Total: <span id="current-user-global">0</span>
    </div>
</header>

<div class="container">
    <div id="home" class="view">
        <div class="grid">
            <div class="card" onclick="openSeries('boys')">
                <img src="img/serie1.png" alt="BOF">
            </div>
            <div class="card" onclick="openSeries('stranger')">
                <img src="img/serie2.jpg" alt="ST">
            </div>
        </div>
    </div>

    <div id="episodes" class="view">
        <div onclick="switchView('home')" style="padding:20px 0; color:#888">← Volver</div>
        <h2 id="series-title"></h2>
        <div id="episodes-container"></div>
    </div>

    <div id="points" class="view">
        <div onclick="switchView('episodes')" style="padding:20px 0; color:#888">← Atrás</div>
        <div id="betting-ui">
            <p style="color:#666">Dar puntos a:</p>
            <div class="target-name" id="target-player-name"></div>
            <div class="controls">
                <button class="btn-p" onclick="modificar(-1)">-</button>
                <div class="score-big" id="current-bet-val">0</div>
                <button class="btn-p" onclick="modificar(1)">+</button>
            </div>
            <button class="btn-finish" onclick="confirmar()">TERMINAR CAPÍTULO</button>
        </div>
        <div id="locked-ui" class="view" style="text-align:center">
            <div class="locked-card">
                <h3>Capítulo Cerrado</h3>
                <div id="final-result-display" style="font-size: 1.5rem;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const data = {
        boys: { title: "Boys Over Flowers", eps: ["Capítulo 1", "Capítulo 2", "Capítulo 3"] },
        stranger: { title: "Stranger Things", eps: ["La Desaparición", "El Mapa", "El Monstruo"] }
    };

    let user = '';
    let gameState = JSON.parse(localStorage.getItem('netflix_pro')) || {};
    let activeKey = '';

    function login(u) {
        user = u;
        document.getElementById('current-user-name').innerText = u.toUpperCase();
        document.getElementById('main-header').style.display = 'flex';
        updateGlobal();
        switchView('home');
    }

    function updateGlobal() {
        let total = 0;
        Object.values(gameState).forEach(val => { total += val[user] || 0; });
        document.getElementById('current-user-global').innerText = total;
    }

    function openSeries(id) {
        document.getElementById('series-title').innerText = data[id].title;
        const container = document.getElementById('episodes-container');
        container.innerHTML = '';
        data[id].eps.forEach((ep, i) => {
            const key = `${id}-${i}`;
            const state = gameState[key];
            let tag = '';
            if(state && state.locked) {
                const diff = Math.abs(state.franco - state.jess);
                const winner = state.franco > state.jess ? 'Franco' : (state.jess > state.franco ? 'Jess' : 'Empate');
                tag = `<div class="winner-tag">Ganador: <b>${winner}</b> (${state.franco}-${state.jess})</div>`;
            }
            container.innerHTML += `
                <div class="ep-row" onclick="openPoints('${key}', '${ep}')">
                    <div>
                        <div>${ep}</div>
                        ${tag}
                    </div>
                    <div style="color:var(--n-red)">${state?.locked ? '🔒' : '▶'}</div>
                </div>`;
        });
        switchView('episodes');
    }

    function openPoints(key, name) {
        activeKey = key;
        if(!gameState[key]) gameState[key] = { franco: 0, jess: 0, locked: false };
        
        const target = (user === 'franco') ? 'jess' : 'franco';
        document.getElementById('target-player-name').innerText = target.toUpperCase();
        document.getElementById('current-bet-val').innerText = gameState[key][target];

        if(gameState[key].locked) {
            document.getElementById('betting-ui').style.display = 'none';
            document.getElementById('locked-ui').classList.add('active');
            document.getElementById('final-result-display').innerHTML = 
                `Resultado Final:<br>Franco: ${gameState[key].franco} | Jess: ${gameState[key].jess}`;
        } else {
            document.getElementById('betting-ui').style.display = 'block';
            document.getElementById('locked-ui').classList.remove('active');
        }
        switchView('points');
    }

    function modificar(val) {
        const target = (user === 'franco') ? 'jess' : 'franco';
        gameState[activeKey][target] += val;
        document.getElementById('current-bet-val').innerText = gameState[activeKey][target];
        localStorage.setItem('netflix_pro', JSON.stringify(gameState));
        updateGlobal();
    }

    function confirmar() {
        if(confirm("¿Terminar capítulo? Se mostrarán los resultados.")) {
            gameState[activeKey].locked = true;
            localStorage.setItem('netflix_pro', JSON.stringify(gameState));
            openPoints(activeKey);
        }
    }

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
