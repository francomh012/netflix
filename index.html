<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Netflix</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --n-red:#E50914;
}

body {
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
}

/* LOGIN */
#login {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:0.3s;
}

.profile-box { display:flex; gap:25px; }

.profile { text-align:center; cursor:pointer; }
.profile img {
    width:90px;
    height:90px;
    border-radius:6px;
}

/* HEADER */
header {
    display:none;
    padding:15px;
    justify-content:space-between;
    background:black;
    border-bottom:1px solid #111;
}

.container { padding:15px; }

.view { display:none; }
.active { display:block; }

/* GRID */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card img {
    width:100%;
    border-radius:5px;
}

/* EPISODIOS */
.ep-row {
    padding:15px 0;
    border-bottom:1px solid #222;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

/* PUNTOS */
.controls {
    display:flex;
    justify-content:center;
    gap:20px;
}

.btn {
    width:60px;
    height:60px;
    border-radius:50%;
    font-size:2rem;
}

.num {
    font-size:3rem;
}

.btn-fin {
    width:100%;
    padding:15px;
    margin-top:20px;
    background:red;
    color:white;
    border:none;
}

.locked {
    background:#111;
    padding:20px;
    text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h1>¿Quién está viendo?</h1>

<div class="profile-box">
<div class="profile" onclick="startApp('franco')">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png">
<p>Franco</p>
</div>

<div class="profile" onclick="startApp('jess')">
<img src="https://prodigits.co.uk/thumbs/wallpapers/p2/movies/31/76d1810b12631524.jpg">
<p>Jess</p>
</div>
</div>
</div>

<!-- HEADER -->
<header id="header">
<div style="color:red;font-weight:bold">NETFLIX</div>
<div>Usuario: <b id="u-name"></b></div>
</header>

<div class="container">

<!-- HOME -->
<div id="home" class="view">
<h3>Series</h3>

<div class="grid">
<div class="card" onclick="loadEps('boys')">
<img src="img/serie1.png">
</div>

<div class="card" onclick="loadEps('stranger')">
<img src="img/serie2.jpg">
</div>
</div>
</div>

<!-- EPISODIOS -->
<div id="episodes" class="view">
<div onclick="showView('home')">← Volver</div>
<h2 id="title"></h2>
<div id="list"></div>
</div>

<!-- SCORING -->
<div id="scoring" class="view">
<div onclick="showView('episodes')">← Volver</div>

<h3 id="ep-name"></h3>

<div id="active-ui">
<p>Puntos para:</p>
<h2 id="target"></h2>

<div class="controls">
<button class="btn" onclick="change(-1)">-</button>
<div class="num" id="pts">0</div>
<button class="btn" onclick="change(1)">+</button>
</div>

<button class="btn-fin" onclick="lock()">Finalizar</button>
</div>

<div id="locked-ui" class="locked" style="display:none">
<h3>🔒 Cerrado</h3>
<p id="result"></p>
</div>

</div>
</div>

<script>
// 🔥 CONFIGURA TU KEY AQUÍ
const supa = supabase.createClient(
'https://xgogmukydlcnznbphjns.supabase.co',
'TU_KEY_AQUI'
);

let user = '';
let currentKey = '';

const series = {
boys:{ name:"Boys Over Flowers", eps:["Ep1","Ep2","Ep3","Ep4"] },
stranger:{ name:"Stranger Things", eps:["Cap1","Cap2","Cap3"] }
};

// LOGIN ESTILO NETFLIX
function startApp(u){
    user = u;

    const login = document.getElementById('login');
    login.style.opacity = '0';

    setTimeout(() => {
        login.style.display = 'none';
    }, 300);

    document.getElementById('header').style.display='flex';
    document.getElementById('u-name').innerText = u;

    showView('home');
}

// CREAR SI NO EXISTE
async function ensure(id){
    const {data} = await supa.from('game_state').select('*').eq('id',id).single();

    if(!data){
        await supa.from('game_state').insert({
            id:id,
            franco_pts:0,
            jess_pts:0,
            is_locked:false
        });
    }
}

// CARGAR EPISODIOS
async function loadEps(id){
    showView('episodes');

    document.getElementById('title').innerText = series[id].name;
    const list = document.getElementById('list');
    list.innerHTML='Cargando...';

    const {data} = await supa.from('game_state').select('*');

    list.innerHTML='';

    for(let i=0;i<series[id].eps.length;i++){
        const key = `${id}-${i}`;
        await ensure(key);

        const ep = data.find(d=>d.id===key);

        let txt='';
        if(ep?.is_locked){
            txt=`(${ep.franco_pts}-${ep.jess_pts})`;
        }

        list.innerHTML+=`
        <div class="ep-row" onclick="openScore('${key}','${series[id].eps[i]}')">
            <span>${series[id].eps[i]} ${txt}</span>
            <span>${ep?.is_locked?'🔒':'▶'}</span>
        </div>`;
    }
}

// ABRIR
async function openScore(key,name){
    currentKey = key;

    document.getElementById('ep-name').innerText = name;

    const targetUser = user==='franco'?'jess':'franco';
    document.getElementById('target').innerText = targetUser;

    const {data} = await supa.from('game_state').select('*').eq('id',key).single();

    document.getElementById('pts').innerText = data[targetUser+'_pts'];

    if(data.is_locked){
        document.getElementById('active-ui').style.display='none';
        document.getElementById('locked-ui').style.display='block';

        document.getElementById('result').innerText =
        `Franco ${data.franco_pts} - ${data.jess_pts} Jess`;
    } else {
        document.getElementById('active-ui').style.display='block';
        document.getElementById('locked-ui').style.display='none';
    }

    showView('scoring');
}

// CAMBIAR
async function change(v){
    let n = parseInt(document.getElementById('pts').innerText);
    n += v;

    document.getElementById('pts').innerText = n;

    const targetUser = user==='franco'?'jess':'franco';

    await supa.from('game_state')
    .update({[targetUser+'_pts']:n})
    .eq('id',currentKey);
}

// BLOQUEAR
async function lock(){
    await supa.from('game_state')
    .update({is_locked:true})
    .eq('id',currentKey);

    openScore(currentKey,document.getElementById('ep-name').innerText);
}

// VISTAS
function showView(id){
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
